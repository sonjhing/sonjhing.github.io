---
layout: default
---

<section class="project-page">

    <div class="project-hero">
        <img src="{{ page.cover }}" alt="{{ page.title }}">
    </div>

    <div class="project-content">

        <h1>{{ page.title }}</h1>

        <div class="meta">
            <span>{{ page.year }}</span>
            <span>{{ page.category }}</span>
        </div>

        {{ content }}

    </div>

</section>
