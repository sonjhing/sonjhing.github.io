<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart City Advanced 3D Simulation</title>

<style>
/* ======================
   RESET & SMOOTH SCROLL
====================== */
html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

body {
  margin: 0;
  background: #020617;
  color: white;
  font-family: 'Segoe UI', Roboto, sans-serif;
  overflow-x: hidden;
}

section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  position: relative;
  box-sizing: border-box;
}

/* ======================
   HERO SCREEN
========================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  scroll-snap-align: start;
  background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
  text-align: center;
  position: relative;
  perspective: 1000px;
  perspective-origin: center;
}

.hero-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: heroScrollOut linear both;
  animation-timeline: scroll(root);
  animation-range: exit;
}

.hero h1 {
  color: #00e5ff;
  font-size: 64px;
  letter-spacing: 4px;
  margin: 0 0 10px 0;
  text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
  animation: pulse 2s infinite alternate;
}

.hero p {
  color: #94a3b8;
  font-size: 20px;
  margin: 0 0 50px 0;
}

.scroll-hint {
  color: #00e5ff;
  animation: bounce 2s infinite;
  font-weight: bold;
  letter-spacing: 2px;
  opacity: 0.8;
}

@keyframes heroScrollOut {
  to {
    transform: translateZ(-300px) translateY(-50px);
    opacity: 0;
    filter: blur(5px);
  }
}

@keyframes pulse {
  from { text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
  to { text-shadow: 0 0 30px rgba(0, 229, 255, 0.9), 0 0 50px rgba(0, 229, 255, 0.4); }
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
  60% { transform: translateY(-5px); }
}

h2 {
  font-size: 32px;
  margin-bottom: 20px;
  color: #f8fafc;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  letter-spacing: 1px;
}

/* ======================
   SUBWAY STATION & HUD
====================== */
.subway {
  width: 1000px;
  height: 550px;
  background: linear-gradient(180deg, #091124 0%, #020617 100%);
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  border: 2px solid #1e293b;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
  perspective: 1000px;
  cursor: pointer;
}

.subway.low { border-color: #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.25); }
.subway.mid { border-color: #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }
.subway.high { border-color: #ef4444; box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); }

.subway::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px);
  background-size: 100% 20px;
  pointer-events: none;
}

.subway-hud {
  position: absolute;
  top: 24px;
  left: 24px;
  right: 24px;
  background: rgba(4, 10, 22, 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 20px 28px;
  border-radius: 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 10;
  pointer-events: none;
}

.hud-instruction {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.hud-instruction .main-alert {
  font-size: 1.8rem;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 0.8px;
}
.subway.low .main-alert { text-shadow: 0 0 12px rgba(16, 185, 129, 0.6); }
.subway.mid .main-alert { text-shadow: 0 0 12px rgba(245, 158, 11, 0.6); }
.subway.high .main-alert { text-shadow: 0 0 12px rgba(239, 68, 68, 0.6); }

.hud-instruction .sub-alert {
  font-size: 1.2rem;
  color: #cbd5e1;
  font-weight: 500;
}

.hud-status-badge {
  display: flex;
  align-items: center;
  gap: 28px;
}

.status-light {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.status-light::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.subway.low .status-light { color: #10b981; }
.subway.low .status-light::before { background: #10b981; box-shadow: 0 0 12px #10b981; }
.subway.mid .status-light { color: #f59e0b; }
.subway.mid .status-light::before { background: #f59e0b; box-shadow: 0 0 12px #f59e0b; }
.subway.high .status-light { color: #ef4444; }
.subway.high .status-light::before { background: #ef4444; box-shadow: 0 0 12px #ef4444; }

.hud-counter-board {
  border-left: 1px solid rgba(255,255,255,0.15);
  padding-left: 24px;
}
.hud-counter-board .count-lbl {
  font-size: 0.75rem;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.hud-counter-board .count-val {
  font-size: 2.2rem;
  font-weight: 800;
  color: #00e5ff;
  font-family: monospace;
  text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
  line-height: 1;
}

/* 👥 승객 노드 */
.passenger {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  position: absolute;
  background: #00e5ff;
  cursor: pointer;
  box-shadow: 0 0 10px #00e5ff, 0 0 20px rgba(0,229,255,0.7);
  animation: passengerMove 4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
  transition: transform .2s, background-color 0.3s;
  pointer-events: auto;
  z-index: 5;
}
.passenger:hover { transform: scale(1.3); }
.passenger.selected {
  background: #10b981;
  box-shadow: 0 0 15px #10b981, 0 0 30px #10b981;
}

@keyframes passengerMove {
  0% { transform: translateY(-20px) translateZ(80px); opacity: 0; scale: 1.5; }
  12% { opacity: 1; scale: 1; }
  100% { transform: translateY(470px) translateZ(0px); opacity: 0; }
}

/* 기차 오브젝트 */
.train {
  position: absolute;
  bottom: 40px;
  left: -250px;
  width: 240px;
  height: 70px;
  background: linear-gradient(90deg, #334155, #cbd5e1, #64748b);
  border-radius: 12px;
  box-shadow: 0 20px 30px rgba(0,0,0,0.7);
  animation: trainMove 7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  transform: translateZ(40px) rotateY(-15deg); 
}

.train::before {
  content: "";
  position: absolute;
  top: 15px;
  left: 15px;
  width: 210px;
  height: 22px;
  background: repeating-linear-gradient(90deg, #00e5ff 0px, #00e5ff 25px, transparent 25px, transparent 38px);
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
  border-radius: 4px;
}

.train::after {
  content: "";
  position: absolute;
  right: -5px;
  top: 30px;
  width: 12px;
  height: 12px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 20px #fff, 0 0 40px #00e5ff, 0 0 60px #00e5ff;
}

@keyframes trainMove {
  0% { left: -260px; }
  40%, 60% { left: 280px; }
  100% { left: 850px; }
}

/* ======================
   3D DRONE MAP
====================== */
.map-container {
  perspective: 1500px;
  padding: 20px;
}

.map {
  width: 800px;
  height: 500px;
  position: relative;
  border-radius: 24px;
  overflow: hidden;
  border: 2px solid #334155;
  background: #020617;
  transform: rotateX(55deg) rotateZ(-15deg);
  transform-style: preserve-3d;
  box-shadow: 0 50px 100px rgba(0,0,0,0.8), 0 0 50px rgba(14, 165, 233, 0.1);
  transition: transform 0.5s ease;
}

.map:hover {
  transform: rotateX(50deg) rotateZ(-10deg);
}

.map::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.land {
  position: absolute;
  width: 100%;
  height: 55%;
  top: 0;
  background: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
  border-bottom: 3px solid #10b981;
}

.water {
  position: absolute;
  width: 100%;
  height: 45%;
  bottom: 0;
  background: linear-gradient(180deg, #0c4a6e 0%, #0369a1 100%);
  overflow: hidden;
}

.water::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%; left: -50%;
  background: radial-gradient(circle, rgba(14,211,233,0.1) 0%, transparent 60%);
  animation: oceanMove 10s linear infinite;
}

@keyframes oceanMove { 100% { transform: rotate(360deg); } }

.drone {
  width: 24px;
  height: 24px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  transform: translateZ(60px); 
  transform-style: preserve-3d;
  box-shadow: 0 40px 20px rgba(0,0,0,0.5);
  left: 388px;
  top: 238px;
}

.drone::before {
  content: "";
  position: absolute;
  inset: -6px;
  border: 2px dashed #00e5ff;
  border-radius: 50%;
  animation: spin 0.5s linear infinite;
  box-shadow: 0 0 15px #00e5ff;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

.trail-dot {
  position: absolute;
  width: 6px;
  height: 6px;
  background: #00e5ff;
  border-radius: 50%;
  opacity: 0.8;
  pointer-events: none;
  transform: translateZ(55px);
  box-shadow: 0 0 8px #00e5ff;
  animation: fadeOut 0.8s forwards;
}

@keyframes fadeOut { 100% { opacity: 0; scale: 0.1; } }

.click-hint {
  margin-top: 15px;
  color: #64748b;
  font-size: 20px;
  font-weight: 500;
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <h1>SMART CITY SYSTEM</h1>
    <p>Subway Crowd Simulation · Air Surf Drone</p>
    <div class="scroll-hint">↓ SCROLL TO EXPLORE ↓</div>
  </div>
</div>

<section>
  <h2>Subway Crowd Monitor</h2>
  
  <div class="subway low" id="subway">
    <div class="subway-hud">
      <div class="hud-instruction">
        <span class="main-alert">Interactive </span>
        <span class="sub-alert">패널 클릭 시 인구가 증가합니다.</span>
      </div>
      <div class="hud-status-badge">
        <div class="status-light" id="statusLabel">Stable</div>
        <div class="hud-counter-board">
          <div class="count-lbl">Inflow Volume</div>
          <div class="count-val" id="densityCounter">00</div>
        </div>
      </div>
    </div>
    
    <div class="train"></div>
  </div>
  
  <div class="click-hint">인구 데이터 추이에 맞추어 디스플레이 테두리 LED가 실시간으로 변경됩니다.</div>
</section>

<section>
  <h2>🚁 Air Surf Drone Controller</h2>
  <div class="map-container">
    <div class="map" id="map">
      <div class="land"></div>
      <div class="water"></div>
      <div class="drone" id="drone"></div>
    </div>
  </div>
  <div class="click-hint">마우스를 맵 위에 올리면 드론이 따라옵니다.</div>
</section>

<script>
/* ======================
   SUBWAY SYSTEM (JS)
====================== */
const subway = document.getElementById("subway");
const densityCounter = document.getElementById("densityCounter");
const statusLabel = document.getElementById("statusLabel");
let crowd = 0;

// 커스텀 임계치 적용 규칙 (초록 Stable: ~10 / 주황 Warning: ~50 / 빨강 Danger: 51~)
function updateColor() {
  subway.classList.remove("low", "mid", "high");
  if (crowd <= 10) {
    subway.classList.add("low");
    statusLabel.innerText = "Stable";
  } else if (crowd <= 50) {
    subway.classList.add("mid");
    statusLabel.innerText = "Warning";
  } else {
    subway.classList.add("high");
    statusLabel.innerText = "Danger";
  }
  densityCounter.innerText = String(crowd).padStart(2, '0');
}

function createPassenger() {
  let p = document.createElement("div");
  p.className = "passenger";
  p.style.left = (Math.random() * 740 + 30) + "px";
  p.style.top = "-10px";
  
  p.addEventListener("click", (e) => {
    e.stopPropagation();
    p.classList.toggle("selected");
  });
  
  subway.appendChild(p);
  setTimeout(() => p.remove(), 4000);
}

setInterval(() => {
  createPassenger();
  if (crowd > 0) crowd -= 1;
  updateColor();
}, 100);

subway.addEventListener("click", () => {
  for (let i = 0; i < 8; i++) {
    setTimeout(createPassenger, i * 50);
  }
  crowd += 8;
  updateColor();
});


/* ======================
   🤖 DRONE HYBRID TRACKING SYSTEM (마우스 정지 감지 보정형)
====================== */
const drone = document.getElementById("drone");
const map = document.getElementById("map");

let droneX = 388;
let droneY = 238;
let targetX = 388;
let targetY = 238;

let isMouseActive = false; 
let mouseMoveTimeout = null; 

map.addEventListener("mousemove", (e) => {
  isMouseActive = true;
  
  const rect = map.getBoundingClientRect();
  targetX = e.clientX - rect.left - 12;
  targetY = (e.clientY - rect.top) * 1.35 - 12; 

  if (targetX < 10) targetX = 10;
  if (targetX > 766) targetX = 766;
  if (targetY < 10) targetY = 10;
  if (targetY > 466) targetY = 466;

  clearTimeout(mouseMoveTimeout);

  // 1.5초간 움직임이 감지되지 않으면 순항 모드로 자동 복귀 타이머 작동
  mouseMoveTimeout = setTimeout(() => {
    isMouseActive = false;
    pickRandomTarget(); 
  }, 1500);
});

map.addEventListener("mouseleave", () => {
  clearTimeout(mouseMoveTimeout);
  isMouseActive = false;
  pickRandomTarget();
});

function pickRandomTarget() {
  if (!isMouseActive) {
    targetX = Math.random() * 700 + 50;
    targetY = Math.random() * 400 + 50;
  }
}

function createTrail(x, y) {
  const trail = document.createElement("div");
  trail.className = "trail-dot";
  trail.style.left = (x + 9) + "px"; 
  trail.style.top = (y + 9) + "px";
  map.appendChild(trail);
  setTimeout(() => trail.remove(), 800);
}

function moveDrone() {
  let dx = targetX - droneX;
  let dy = targetY - droneY;

  let isWater = droneY > (500 * 0.55);
  let easing = isWater ? 0.02 : 0.06;

  droneX += dx * easing;
  droneY += dy * easing;

  drone.style.left = droneX + "px";
  drone.style.top = droneY + "px";

  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
    if (Math.random() > 0.4) {
      createTrail(droneX, droneY);
    }
  }

  if (!isMouseActive && Math.abs(dx) < 15 && Math.abs(dy) < 15) {
    pickRandomTarget();
  }

  requestAnimationFrame(moveDrone);
}

moveDrone();
</script>

</body>
</html>
