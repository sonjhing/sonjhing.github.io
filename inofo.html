<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart City Advanced 3D Simulation</title>

<style>
/* ======================
   RESET & SMOOTH SCROLL
====================== */
html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

body {
  margin: 0;
  background: #020617;
  color: #94a3b8;
  font-family: 'Segoe UI', Roboto, sans-serif;
  overflow-x: hidden;
}

section {
  height: 100vh;
  scroll-snap-align: start;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  position: relative;
  box-sizing: border-box;
}

/* ======================
   HERO SCREEN (원본 디자인 100% 유지)
========================= */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  scroll-snap-align: start;
  background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
  text-align: center;
  position: relative;
  perspective: 1000px;
  perspective-origin: center;
}

.hero-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  animation: heroScrollOut linear both;
  animation-timeline: scroll(root);
  animation-range: exit;
}

.hero h1 {
  color: #00e5ff;
  font-size: 64px;
  letter-spacing: 4px;
  margin: 0 0 10px 0;
  text-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
  animation: pulse 2s infinite alternate;
}

.hero p {
  color: #94a3b8;
  font-size: 20px;
  margin: 0 0 50px 0;
}

.scroll-hint {
  color: #00e5ff;
  animation: bounce 2s infinite;
  font-weight: bold;
  letter-spacing: 2px;
  opacity: 0.8;
}

@keyframes heroScrollOut {
  to {
    transform: translateZ(-300px) translateY(-50px);
    opacity: 0;
    filter: blur(5px);
  }
}

@keyframes pulse {
  from { text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
  to { text-shadow: 0 0 30px rgba(0, 229, 255, 0.9), 0 0 50px rgba(0, 229, 255, 0.4); }
}

@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-10px); }
  60% { transform: translateY(-5px); }
}

/* ======================
   🔲 NAVIGATION MENU (네온 블루 무드 리디자인)
========================= */
.menu-section {
  /* 배경을 더 딥한 블루-블랙 그라데이션으로 변경 */
  background: radial-gradient(circle at center, #030d26 0%, #01040d 100%);
  position: relative;
}

/* 타이틀: 흰색을 빼고 네온 블루 그라데이션 + 발광 효과 적용 */
.menu-section h2 {
  font-size: 38px;
  font-weight: 800;
  margin: 0 0 10px 0;
  background: linear-gradient(135deg, #00e5ff 0%, #3b82f6 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 3px;
  text-transform: uppercase;
  filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.3));
}

.menu-section .subtitle {
  font-size: 15px;
  color: #1e40af; /* 톤다운된 블루 */
  margin-bottom: 50px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 600;
}

.menu-container {
  display: flex;
  gap: 40px;
}

/* 네모 박스 기본 상태: 블루 베이스 테두리와 은은한 다크블루 빛 */
.menu-box {
  width: 340px;
  height: 240px;
  background: rgba(7, 15, 36, 0.7);
  border: 2px solid #1e3a8a; /* 푸른빛 테두리 */
  border-radius: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(30, 58, 138, 0.3);
}

/* 아이콘 호버 전 기본 필터 */
.menu-box .icon {
  font-size: 52px;
  margin-bottom: 18px;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.2));
}

/* 박스 타이틀: 기본 상태도 시안/블루 톤 적용 */
.menu-box h3 {
  font-size: 24px;
  margin: 0 0 12px 0;
  font-weight: 700;
  letter-spacing: 1px;
  color: #93c5fd; /* 연한 블루 */
  transition: all 0.3s;
}

.menu-box p {
  font-size: 14px;
  color: #4b5563;
  margin: 0;
  text-align: center;
  padding: 0 30px;
  line-height: 1.5;
  transition: all 0.3s;
}

/* --- 1. Smart Safety Hover Effect (강렬한 Cyan ⚡) --- */
.menu-box.safety:hover {
  transform: translateY(-15px);
  border-color: #00e5ff;
  background: linear-gradient(135deg, rgba(7, 15, 36, 0.9) 0%, rgba(6, 182, 212, 0.15) 100%);
  box-shadow: 0 30px 60px rgba(0, 229, 255, 0.3), inset 0 0 25px rgba(0, 229, 255, 0.2);
}
.menu-box.safety:hover .icon {
  transform: scale(1.15) translateY(-5px);
  filter: drop-shadow(0 0 20px rgba(0, 229, 255, 0.9));
}
.menu-box.safety:hover h3 {
  color: #00e5ff;
  text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
}
.menu-box.safety:hover p {
  color: #93c5fd;
}

/* --- 2. 과자 인식 Hover Effect (원래 오렌지 무드에서 -> Electric Blue로 전면 변경 💎) --- */
.menu-box.snack:hover {
  transform: translateY(-15px);
  border-color: #3b82f6; /* 일렉트릭 블루 */
  background: linear-gradient(135deg, rgba(7, 15, 36, 0.9) 0%, rgba(59, 130, 246, 0.15) 100%);
  box-shadow: 0 30px 60px rgba(59, 130, 246, 0.3), inset 0 0 25px rgba(59, 130, 246, 0.2);
}
.menu-box.snack:hover .icon {
  transform: scale(1.15) translateY(-5px);
  filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.9));
}
.menu-box.snack:hover h3 {
  color: #60a5fa;
  text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
}
.menu-box.snack:hover p {
  color: #93c5fd;
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-content">
    <h1>Project SYSTEM</h1>
    <p> Smart City , Smart snack</p>
    <div class="scroll-hint">↓ SCROLL TO EXPLORE ↓</div>
  </div>
</div>

<section class="menu-section">
  <h2>Select Simulation System</h2>
  <div class="subtitle">System Architecture Core</div>
  
  <div class="menu-container">
    
    <a href="safe.html" class="menu-box safety">
      <div class="icon">🏎️</div>
      <h3>Smart Safety</h3>
      <p> 스마트 안전 시뮬레이션</p>
    </a>
    
    <a href="snack.html" class="menu-box snack">
      <div class="icon">🍪</div>
      <h3>과자 인식 Engine</h3>
      <p>스마트 딥러닝 실시간 과자 탐지 엔진</p>
    </a>
    
  </div>
</section>

</body>
</html>
