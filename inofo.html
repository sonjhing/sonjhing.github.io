<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Smart City Simulation</title>

<style>

/* ======================
   SMOOTH SCROLL (강화)
====================== */
  <!-- HERO START SCREEN -->
<div class="hero">
  <div class="hero-inner">
    <h1>SMART CITY SYSTEM</h1>
    <p>Subway Crowd Simulation · Autonomous Drone Navigation</p>

    <div class="scroll-hint">↓ SCROLL TO EXPLORE ↓</div>
  </div>
</div>
html {
  scroll-behavior: smooth;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

section {
  height:100vh;
  scroll-snap-align: start;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* ======================
   BASE
====================== */
body {
  margin:0;
  background:#020617;
  color:white;
  font-family:sans-serif;
}

/* ======================
   HERO
====================== */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.hero h1 {
  color:#00e5ff;
  font-size:52px;
}

/* ======================
   SUBWAY
====================== */
.subway {
  width:500px;
  height:300px;
  background:#0b1633;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  border:1px solid #1f3b6d;
  transition:1s;
}

.low { background:#064e3b; }
.mid { background:#854d0e; }
.high { background:#7f1d1d; }

.dot {
  width:6px;
  height:6px;
  background:#00e5ff;
  border-radius:50%;
  position:absolute;
  animation: float 6s linear forwards;
}

@keyframes float {
  0% { transform:translateY(-10px); }
  100% { transform:translateY(320px); opacity:0; }
}

/* ======================
   MAP (DRONE)
====================== */
.map {
  width:700px;
  height:400px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  border:1px solid #1f3b6d;
}

/* LAND */
.land {
  position:absolute;
  width:100%;
  height:60%;
  background:#14532d;
  top:0;
}

/* WATER */
.water {
  position:absolute;
  width:100%;
  height:40%;
  bottom:0;
  background:#0ea5e9;
  opacity:0.3;
}

/* DRONE */
.drone {
  width:20px;
  height:20px;
  background:#00e5ff;
  border-radius:50%;
  position:absolute;
  box-shadow:0 0 15px #00e5ff;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>SMART CITY CONTROL SYSTEM</h1>
  <p>Subway Crowd Simulation + Autonomous Drone Navigation</p>
</div>

<!-- SUBWAY -->
<section>
  <h2>🚇 SUBWAY CROWD SYSTEM</h2>
  <div class="subway low" id="subway"></div>
</section>

<!-- DRONE -->
<section>
  <h2>🚁 DRONE NAVIGATION MAP</h2>

  <div class="map" id="map">
    <div class="land"></div>
    <div class="water"></div>
    <div class="drone" id="drone"></div>
  </div>

</section>

<script>

/* ======================
   SUBWAY SYSTEM
====================== */
let subway = document.getElementById("subway");
let crowd = 0;

function updateColor(){
  subway.classList.remove("low","mid","high");

  if(crowd < 10) subway.classList.add("low");
  else if(crowd < 25) subway.classList.add("mid");
  else subway.classList.add("high");
}

function createDot(){

  let d = document.createElement("div");
  d.className = "dot";

  d.style.left = Math.random()*500 + "px";
  d.style.top = "-10px";

  subway.appendChild(d);

  setTimeout(()=>d.remove(), 6000);
}

/* 자연 생성 (idle = 약한 혼잡) */
setInterval(() => {
  createDot();

  if(crowd > 0) crowd -= 1;

  updateColor();

}, 400);

/* 클릭 = 급격 증가 */
subway.addEventListener("click", () => {

  for(let i=0;i<5;i++){
    createDot();
  }

  crowd += 5;
  updateColor();

});

/* ======================
   DRONE SYSTEM
====================== */
let drone = document.getElementById("drone");
let map = document.getElementById("map");

let x = 100;
let y = 100;

/* path target */
let tx = 500;
let ty = 200;

/* 이동 속도 */
function moveDrone(){

  // 방향 계산
  let dx = tx - x;
  let dy = ty - y;

  x += dx * 0.02;
  y += dy * 0.02;

  /* LAND / WATER SPEED EFFECT */
  let isWater = y > 200;

  let speed = isWater ? 0.01 : 0.03;

  x += dx * speed;
  y += dy * speed;

  drone.style.left = x + "px";
  drone.style.top = y + "px";

  /* 목표 변경 */
  if(Math.abs(dx) < 10 && Math.abs(dy) < 10){

    tx = Math.random()*600;
    ty = Math.random()*350;

  }

  requestAnimationFrame(moveDrone);
}

moveDrone();

</script>

</body>
</html>
