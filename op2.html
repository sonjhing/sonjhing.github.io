<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말랑말랑 오징어 다리 룰렛</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --sky1: #e0f2fe;
            --sky2: #bae6fd;
            --text: #0369a1;
            --card-bg: rgba(255, 255, 255, 0.9);
            --squid: #ff7a7a;
            --squid-dark: #ff6565;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', 'Nunito', sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom, var(--sky1), var(--sky2));
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 950;
            color: #0369a1;
            margin-bottom: 50px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }

        p.subtitle {
            font-size: 1.3rem;
            margin-bottom: 70px;
            opacity: 0.8;
            text-align: center;
            color: #0c4a6e;
        }

        /* 오징어 전체 컨테이너 */
        .squid-container {
            position: relative;
            width: 800px;
            height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s;
        }

        /* 오징어 머리 및 귀 (첫 번째 디자인 반영) */
        .squid-head {
            position: relative;
            width: 800px;
            height: 820px;
            background-color: var(--squid);
            border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
            box-shadow: inset -15px -15px 0px rgba(0,0,0,0.1), 0 15px 30px rgba(0,0,0,0.1);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .squid-head::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 90px solid var(--squid);
            border-bottom: 90px solid transparent;
            transform: rotate(-25deg);
        }

        .squid-head::after {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 0;
            height: 0;
            border-right: 50px solid transparent;
            border-left: 90px solid var(--squid);
            border-bottom: 90px solid transparent;
            transform: rotate(25deg);
        }

        /* 두 번째 코드의 텍스트 표정 시스템 */
        .face {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 3px 8px rgba(0,0,0,0.2);
            z-index: 15;
            user-select: none;
            transition: all 0.2s;
            margin-top: 50px;
        }

        /* 다리 묶음 */
        .squid-legs {
            display: flex;
            justify-content: space-between;
            width: 320px;
            height: 200px;
            margin-top: -15px;
            z-index: 1;
        }

        /* 개별 다리 스타일 (첫 번째 디자인 기반 유지 및 기능 확장) */
        .leg {
            width: 22px;
            height: 180px;
            background-color: #ff8e8e;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, opacity 0.5s;
            position: relative;
            transform-origin: top center;
            box-shadow: inset -3px 0px 0px rgba(0,0,0,0.08), 0 5px 10px rgba(0,0,0,0.05);
        }

        .leg:hover {
            background-color: var(--squid-dark);
            transform: scale(1.05);
        }

        /* 빨판 표현 */
        .leg::before {
            content: '••••••••';
            position: absolute;
            top: 20px;
            left: 4px;
            color: #ffccd5;
            font-size: 14px;
            letter-spacing: 5px;
            writing-mode: vertical-rl;
        }

        /* 긴 다리 2개 데코레이션 */
        .leg.long {
            height: 200px;
            background-color: var(--squid-dark);
        }

        /* 애니메이션 효과들 */
        .leg.pulled {
            pointer-events: none;
            animation: fallOff 0.8s forwards ease-in;
        }

        @keyframes fallOff {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            30% { transform: translateY(10px) rotate(15deg); opacity: 1; }
            100% { transform: translateY(500px) rotate(45deg); opacity: 0; }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes explode {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.3); filter: brightness(1.8) contrast(2); background-color: #ff3333; }
            100% { transform: scale(0); opacity: 0; }
        }

        .shake { animation: shake 0.5s infinite; }
        .explode { animation: explode 0.5s forwards; }
        
        .bg-flash { animation: bgFlash 0.5s forwards; }
        @keyframes bgFlash {
            0% { background: #ff4d4d; }
            100% { background: #2a0808; }
        }

        /* 결과 오버레이 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay h2 {
            font-size: 3.5rem;
            color: white;
            margin-bottom: 30px;
            text-align: center;
        }

        .restart-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            border: none;
            background: #ff6b6b;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
            transition: transform 0.2s;
        }

        .restart-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <h1>🦑 오징어 다리 룰렛</h1>
    <p class="subtitle">10개의 다리 중 1개 중 한개만 구워집니다.</p>

    <div class="squid-container" id="gameArea">
        <div class="squid-head" id="squid">
            <div class="face" id="face">( ⊙_⊙ )</div>
        </div>

        <div class="squid-legs" id="legs">
            </div>
    </div>

    <div class="overlay" id="overlay">
        <h2 id="resultMsg">GAME OVER</h2>
        <button class="restart-btn" onclick="initGame()">다시 하기 🔄</button>
    </div>

    <script>
        const legsContainer = document.getElementById('legs');
        const face = document.getElementById('face');
        const squid = document.getElementById('squid');
        const container = document.getElementById('gameArea');
        const overlay = document.getElementById('overlay');
        const resultMsg = document.getElementById('resultMsg');
        
        let bombIndex = -1;
        let pulledCount = 0;
        let gameOver = false;

        // 게임 초기화 함수
        function initGame() {
            legsContainer.innerHTML = '';
            face.innerText = '( ⊙_⊙ )';
            squid.className = 'squid-head'; 
            container.style.transform = 'scale(1)';
            document.body.classList.remove('bg-flash');
            overlay.classList.remove('active');
            
            bombIndex = Math.floor(Math.random() * 10);
            pulledCount = 0;
            gameOver = false;
            
            // 10개의 다리 생성 (3번째와 8번째 다리는 롱다리 장식 적용)
            for (let i = 0; i < 10; i++) {
                const leg = document.createElement('div');
                leg.className = 'leg';
                if (i === 2 || i === 7) {
                    leg.classList.add('long');
                }
                leg.onclick = () => pullLeg(leg, i);
                legsContainer.appendChild(leg);
            }
        }

        // 다리 당기기 함수
        function pullLeg(legElement, index) {
            if (gameOver) return;
            if (legElement.classList.contains('pulled')) return;
            
            // 꽝! 폭탄을 뽑은 경우
            if (index === bombIndex) {
                gameOver = true;
                legElement.style.backgroundColor = '#ff3333';
                
                // 울퉁불퉁 떨리는 효과와 충격 표정
                face.innerText = '( X_X )';
                squid.classList.add('shake');
                
                setTimeout(() => {
                    // 펑! 터지며 사라지는 연출
                    squid.classList.replace('shake', 'explode');
                    document.body.classList.add('bg-flash');
                    
                    setTimeout(() => {
                        resultMsg.innerText = "💥 냠 ! 오징어가 맛있게 구워졌습니다 💥";
                        resultMsg.style.color = "#ff4d4d";
                        overlay.classList.add('active');
                    }, 500);
                }, 800); 
                
            } else {
                // 안전하게 다리를 뗀 경우
                legElement.classList.add('pulled');
                pulledCount++;
                
                // 두 번째 코드의 귀여운 랜덤 표정 변화
                const safeFaces = ['( >_< )', '( ㅠ_ㅠ )', '( ºΔº )', '( ;_; )'];
                face.innerText = safeFaces[Math.floor(Math.random() * safeFaces.length)];
                
                // 몸통이 아파서 움찔하는 모션
                container.style.transform = 'scale(0.95)';
                
                setTimeout(() => {
                    container.style.transform = 'scale(1)';
                    if (!gameOver) face.innerText = '( ⊙_⊙ )'; // 평온 상태 복귀
                }, 300);
                
                // 9개의 다리를 모두 안전하게 떼어냈을 때 승리 (남은 1개가 폭탄)
                if (pulledCount === 9) {
                    gameOver = true;
                    setTimeout(() => {
                        face.innerText = '( ^o^ )';
                        resultMsg.innerText = "🎉 냠 ! 생 다리 획득 🎉";
                        resultMsg.style.color = "#4fbf6a";
                        overlay.classList.add('active');
                    }, 500);
                }
            }
        }

        // 게임 시작
        initGame();
    </script>
</body>
</html>
