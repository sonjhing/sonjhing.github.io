<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS IDE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* =========================
   BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000814;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

.cursor-glow {
  position: fixed;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(
    circle,
    rgba(0,229,255,0.2),
    transparent 60%
  );
  transform: translate(-50%, -50%);
  z-index: 9999;
  filter: blur(20px);
  transition: transform 0.05s linear;
}

/* =========================
   SCENE
========================= */
.scene {
  width: 100%;
  height: 100vh;
}

/* =========================
   START SCREEN
========================= */
.start {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.title {
  font-size: 8rem;
  color: #00e5ff;
  font-weight: 800;
  letter-spacing: 10px;
}

.sub {
  color: #7aa7ff;
  margin-top: 20px;
}

.menu {
  display: flex;
  gap: 30px;
  margin-top: 40px;
}

.card {
  width: 200px;
  padding: 40px;
  background: #0b1633;
  border: 1px solid #00e5ff33;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #00e5ff;
}

/* =========================
   IDE
========================= */
.ide-window {
  display: none;
  width: 100%;
  height: 100vh;
  flex-direction: column;
  background: #050b18;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(1.02); }
  to { opacity: 1; transform: scale(1); }
}

.ide-topbar {
  height: 55px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  background: #070f24;
  border-bottom: 1px solid #00e5ff33;
}

.ide-logo {
  color: #00e5ff;
  font-weight: 800;
}

.home-btn {
  border: 1px solid #00e5ff;
  background: transparent;
  color: #00e5ff;
  padding: 6px 12px;
  cursor: pointer;
}

.ide-body {
  display: flex;
  height: calc(100vh - 55px); /* 상단바 높이를 제외한 완벽한 스크롤 제어 */
}

/* SIDEBAR */
.ide-sidebar {
  width: 260px;
  background: #070f24;
  padding: 15px;
  border-right: 1px solid #00e5ff22;
}

.side-title {
  color: #00e5ff;
  font-size: 12px;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

.file {
  padding: 12px 15px;
  margin-bottom: 8px;
  background: #0b1633;
  cursor: pointer;
  color: #8ab4ff;
  transition: 0.2s;
}

.file:hover {
  transform: translateX(4px);
  background: #10264f;
}

.file.active {
  background: #10264f;
  color: #00e5ff;
  border-left: 3px solid #00e5ff;
}

.file:active {
  transform: scale(0.95);
}

/* EDITOR */
.ide-editor {
  flex: 1;
  padding: 40px;
  overflow-y: auto;
}

/* Custom Scrollbar for IDE Editor */
.ide-editor::-webkit-scrollbar {
  width: 10px;
}
.ide-editor::-webkit-scrollbar-track {
  background: transparent;
}
.ide-editor::-webkit-scrollbar-thumb {
  background: #00e5ff33;
  border-radius: 5px;
}
.ide-editor::-webkit-scrollbar-thumb:hover {
  background: #00e5ff66;
}

.editor-header {
  display: flex;
  justify-content: space-between;
  background: #0b1633;
  padding: 15px 25px;
  color: #00e5ff;
  margin-bottom: 20px;
  border-radius: 12px;
  font-size: 1.05rem;
  font-weight: 600;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.editor-content {
  background: #020713;
  padding: 50px 60px;
  min-height: calc(100% - 75px);
  border: 1px solid #00e5ff22;
  border-radius: 16px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
  line-height: 1.8;
  font-size: 1.05rem;
}

.editor-content h1, .editor-content h2, .editor-content h3 {
  margin-top: 20px;
  margin-bottom: 10px;
  color: #00e5ff;
}

/* ===================================================
   🆕 입체감 있는 3D HTML 프로젝트 그리드 스타일 레이아웃
=================================================== */
.project-grid {
  display: grid;
  /* 핵심 수정: 최소 크기를 키우고 최대 2개까지만 채워지도록 제한 */
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); 
  gap: 30px;            /* 카드 사이의 간격을 살짝 넓혀서 시원하게 배치 */
  margin-top: 40px;
  perspective: 1000px;
}

/* 카드 높이감과 내부 여백을 키워 크기를 더 웅장하게 변경 */
.project-card {
  background: linear-gradient(135deg, #0b1633 0%, #060d24 100%);
  border: 1px solid rgba(0, 229, 255, 0.15);
  border-radius: 18px;  /* 라운드 살짝 더 부드럽게 */
  padding: 60px 30px;   /* 위아래 여백을 25px -> 40px로 늘려 크기 빌드업 */
  text-align: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  
  box-shadow: 
    0 12px 24px rgba(0, 0, 0, 0.35),
    inset 0 1px 2px rgba(255, 255, 255, 0.05);
  transform-style: preserve-3d;
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
              box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
              border-color 0.3s;
}
/* 카드 내부 요소 입체적 들뜨기 */
.project-card h3 {
  font-size: 1.25rem;
  color: #ffffff;
  margin-bottom: 10px;
  transform: translateZ(25px); /* 3D로 튀어나오는 효과 */
  transition: color 0.3s;
}

.project-card p {
  font-size: 0.85rem;
  color: #7aa7ff;
  opacity: 0.8;
  transform: translateZ(15px);
}

/* 마우스 호버 시 극적인 3D 돌출 및 네온 글로우 */
.project-card:hover {
  transform: translateY(-8px) rotateX(4deg) rotateY(-2deg) scale(1.02);
  border-color: #00e5ff;
  box-shadow: 
    0 20px 40px rgba(0, 0, 0, 0.5),
    0 0 25px rgba(0, 229, 255, 0.25),
    inset 0 1px 2px rgba(255, 255, 255, 0.15);
}

.project-card:hover h3 {
  color: #00e5ff;
}

/* ACTIVE */
.active .start { display:none; }
.active .ide-window { display:flex; }
</style>
</head>

<body>

<div class="cursor-glow"></div>

<div class="start">
  <button class="home-btn" onclick="location.href='index.html'" style="position: absolute; top: 20px; left: 20px; z-index: 10;">⬅ MAIN HOME</button>
  <div class="title">Skills</div>
  <div class="sub">coding</div>

  <div class="menu">
    <div class="card" onclick="openIDE('s2py.md')">🐍 Python</div>
    <div class="card" onclick="openIDE('html.md')">🌐 C언어</div>
    <div class="card" onclick="openIDE('ht.html')">⚙️ Html</div>
  </div>
</div>

<div class="ide-window">
  <div class="ide-topbar">
    <div class="ide-logo">Skills</div>
    <button class="home-btn" onclick="goHome()">⬅ HOME</button>
  </div>

  <div class="ide-body">
    <div class="ide-sidebar">
      <div class="side-title">EXPLORER</div>
      <div class="file active" onclick="openFile('s2py.md', this)">🐍 Python</div>
      <div class="file" onclick="openFile('html.md', this)">🌐 C언어</div>
      <div class="file" onclick="openFile('ht.html', this)">⚙️ Html</div>
    </div>

    <div class="ide-editor">
      <div class="editor-header">
        <span id="filename">s2py.md</span>
        <span>UTF-8 | Spaces: 4</span>
      </div>
      <div class="editor-content" id="filecontent"></div>
    </div>
  </div>
</div>

<script>
// 메인 화면 카드 클릭 시 해당 파일을 타겟팅해 IDE 기동
function openIDE(targetFile){
  document.body.classList.add("active");
  const targetElement = Array.from(document.querySelectorAll(".file")).find(f => f.getAttribute('onclick').includes(targetFile));
  openFile(targetFile, targetElement);
}

function goHome(){
  document.body.classList.remove("active");
}

/* FILE SYSTEM */
function openFile(filename, el){
  document.getElementById("filename").innerText = filename;
  
  if(el) {
    document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
    el.classList.add("active");
  }

  let content = "";

  if(filename === "s2py.md"){
    fetch("s2py.md")
      .then(response => {
        if(!response.ok) throw new Error();
        return response.text();
      })
      .then(text => {
        document.getElementById("filecontent").innerHTML = marked.parse(text);
      })
      .catch(err => {
        document.getElementById("filecontent").innerHTML = "<p>Error loading s2py.md.</p>";
      });
    return;
  }

  else if(filename === "html.md"){
    content = `
# C LANGUAGE
\`\`\`c
#include <stdio.h>
int main() {
    printf("Hello Nexus IDE!");
    return 0;
}
\`\`\`
    `;
    document.getElementById("filecontent").innerHTML = marked.parse(content);
  }

  // 🌟 [ht.html] 메뉴 선택 시 입체감 넘치는 3D 프로젝트 네모칸 바인딩 영역
  else if(filename === "ht.html"){
    // innerHTML에 직접 바인딩되므로 마크다운 파서(marked) 우회 처리
    document.getElementById("filecontent").innerHTML = `
      <h1>HTML PROJECTS</h1>
      <p style="color:#64748b; margin-bottom:10px;">관리 중인 웹 어플리케이션 및 디자인 랩 컴포넌트 목록입니다.</p>
      
      <div class="project-grid">
        <div class="project-card" onclick="window.open('https://sonjhing.github.io/hijhing.gi/index.html', '_blank')">
          <h3>🌳 Coding Garden</h3>
          <p> 코딩가든</p>
        </div>

        <div class="project-card" onclick="window.open('op.html', '_blank')">
          <h3>🌌 Squid</h3>
          <p>3D 오징어 다리 떼기</p>
        </div>

        <div class="project-card" onclick="window.open('project3.html', '_blank')">
          <h3>🎮 PUBG Control Center</h3>
          <p>커스텀 키맵 및 전적 레이아웃 대시보드</p>
        </div>
      </div>
    `;
  }
}

/* 마우스 트래킹 부드러운 광원 가동 */
const glow = document.querySelector(".cursor-glow");
let gx = 0, gy = 0;

document.addEventListener("mousemove", (e) => {
  gx = e.clientX;
  gy = e.clientY;
});

function animate(){
  glow.style.left = gx + "px";
  glow.style.top = gy + "px";
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
