<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS IDE</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */
*{
  margin:3;
  padding:5;
  box-sizing:border-box;
}

  
  
body{
  background:#000814;
  color:#fff;
  font-family:'Inter', sans-serif;
  overflow:hidden;
}
.cursor-glow{
  position:fixed;
  width:300px;
  height:300px;
  border-radius:50%;
  pointer-events:none;

  background:radial-gradient(
    circle,
    rgba(0,229,255,0.25),
    transparent 60%
  );

  transform:translate(-50%, -50%);
  z-index:9999;

  filter:blur(20px);
  transition:transform 0.05s linear;
}

  
/* =========================
   SCENE (optional 3D off)
========================= */
.scene{
  width:100%;
  height:100vh;
}

/* =========================
   START SCREEN
========================= */
.start{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.title{
  font-size:8rem;
  color:#00e5ff;
  font-weight:800;
  letter-spacing:10px;
}

.sub{
  color:#7aa7ff;
  margin-top:20px;
}

.menu{
  display:flex;
  gap:30px;
  margin-top:40px;
}

.card{
  width:200px;
  padding:40px;
  background:#0b1633;
  border:1px solid #00e5ff33;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#00e5ff;
}

/* =========================
   IDE
========================= */
.ide-window{
  display:none;
  width:100%;
  height:100vh;
  flex-direction:column;
  background:#050b18;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.05);}
  to{opacity:1; transform:scale(1);}
}

.ide-topbar{
  height:55px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:#070f24;
  border-bottom:1px solid #00e5ff33;
}

.ide-logo{
  color:#00e5ff;
  font-weight:800;
}

.home-btn{
  border:1px solid #00e5ff;
  background:transparent;
  color:#00e5ff;
  padding:6px 12px;
  cursor:pointer;
}

.ide-body{
  display:flex;
  height:100%;
}

/* SIDEBAR */
.ide-sidebar{
  width:260px;
  background:#070f24;
  padding:15px;
  border-right:1px solid #00e5ff22;
}

.side-title{
  color:#00e5ff;
  font-size:12px;
  margin-bottom:15px;
  letter-spacing:2px;
}

.file{
  padding:10px;
  margin-bottom:8px;
  background:#0b1633;
  cursor:pointer;
  color:#8ab4ff;
  transition:0.2s;
}

.file:hover{
  transform:translateX(4px);
  background:#10264f;
}

.file.active{
  background:#10264f;
  color:#00e5ff;
  border-left:3px solid #00e5ff;
}

/* EDITOR */
.ide-editor{
  flex:1;
  padding:20px;
}

.editor-header{
  display:flex;
  justify-content:space-between;
  background:#0b1633;
  padding:10px 15px;
  color:#00e5ff;
  margin-bottom:10px;
}

.editor-content{
  background:#020713;
  padding:20px;
  min-height:400px;
  border:1px solid #00e5ff22;
  white-space:pre-wrap;
}

  .file:active{
  transform:scale(0.95);
}

/* ACTIVE */
.active .start{ display:none; }
.active .ide-window{ display:flex; }

  

</style>
</head>

<body>

<!-- START SCREEN -->
<div class="start">
  <div class="title">Skills</div>
  <div class="sub">coding</div>

  <div class="menu">

    <div class="card" onclick="openIDE()">
      🐍 Python
    </div>

    <div class="card" onclick="openIDE()">
      🌐 C언어
    </div>

    <div class="card" onclick="openIDE()">
      ⚙️ Html
    </div>
  

  </div>
  
</div>
<div class="cursor-glow"></div>
<!-- IDE -->
<div class="ide-window">

  <div class="ide-topbar">
    <div class="ide-logo">Skills</div>
    <button class="home-btn" onclick="goHome()">⬅ HOME</button>
  </div>

  <div class="ide-body">

    <!-- SIDEBAR -->
    <div class="ide-sidebar">
      <div class="side-title">EXPLORER</div>

      <div class="file active" onclick="openFile('s2py.md', this)">🐍 Python </div>
      <div class="file" onclick="openFile('html.md', this)">🌐 C언어 </div>
      <div class="file" onclick="openFile('c.md', this)">⚙️ Html </div>

    </div>

    <!-- EDITOR -->
    <div class="ide-editor">

      <div class="editor-header">
        <span id="filename">s2py.md</span>
        <span>UTF-8 | Spaces: 4</span>
      </div>

      <div class="editor-content" id="filecontent"></div>

    </div>

  </div>
</div>

<script>

function openIDE(){
  document.body.classList.add("active");
  openFile("s2py.md", document.querySelector(".file.active"));
}

function goHome(){
  document.body.classList.remove("active");
}

/* FILE SYSTEM */
function openFile(filename, el){

  document.getElementById("filename").innerText = filename;

  document.querySelectorAll(".file").forEach(f => f.classList.remove("active"));
  el.classList.add("active");

  let content = "";

  if(filename === "s2py.md"){
    fetch("s2py.md")
      .then(response => response.text())
      .then(text => {
        document.getElementById("filecontent").innerText = text;
      })
      .catch(err => {
        document.getElementById("filecontent").innerText = "Error loading s2py.md. Please ensure you are viewing this via a web server.";
      });
    return;
  }

  else if(filename === "html.md"){
    content = `
# HTML FILE
<div>Hello World</div>
    `;
  }

  else if(filename === "c.md"){
    content = `
#include <stdio.h>

int main(){
  printf("Hello html");
}
    `;
  }

  document.getElementById("filecontent").innerText = content;
}

/* init */
openFile("s2py.md", document.querySelector(".file"));
const glow = document.querySelector(".cursor-glow");

let gx = 0, gy = 0;

document.addEventListener("mousemove", (e) => {
  gx = e.clientX;
  gy = e.clientY;
});

function animate(){
  glow.style.left = gx + "px";
  glow.style.top = gy + "px";
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
