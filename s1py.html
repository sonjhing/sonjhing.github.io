<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer IDE</title>
  <style>
    :root {
      /* VS Code Dark Theme Colors */
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-tab: #2d2d2d;
      --border-color: #3c3c3c;
      --accent: #007acc;
      --text-main: #cccccc;
      --text-dim: #858585;
      
      --font-mono: 'Consolas', 'Courier New', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-mono);
      overflow: hidden; /* No scroll on body, scroll inside editor */
      height: 100vh;
    }

    /* ─── ANIMATED TAB CONTAINER ─── */
    .tab-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      z-index: 10;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .tab-container.active {
      top: 0;
      left: 250px;
      transform: translate(0, 0);
      width: calc(100% - 250px);
      gap: 0;
      background: var(--bg-panel);
      padding: 0;
    }

    .tab-btn {
      font-family: var(--font-mono);
      font-size: 1.2rem;
      padding: 16px 36px;
      background: #333333;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .tab-btn:hover {
      background: #444444;
      color: #ffffff;
    }

    /* Tabs when in active (top-bar) mode */
    .tab-container.active .tab-btn {
      font-size: 0.9rem;
      padding: 10px 24px;
      border: none;
      border-right: 1px solid var(--border-color);
      border-radius: 0;
      background: var(--bg-tab);
    }
    
    .tab-container.active .tab-btn.active {
      background: var(--bg-dark);
      color: #ffffff;
      border-top: 2px solid var(--accent);
    }

    /* ─── SIDEBAR (EXPLORER) ─── */
    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 250px;
      bottom: 24px; /* above status bar */
      background: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 5;
    }
    
    .sidebar.active {
      transform: translateX(0);
    }
    
    .sidebar-header {
      font-size: 0.75rem;
      padding: 12px 20px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    
    .file-item {
      padding: 6px 20px 6px 30px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .file-item:hover { background: #2a2d2e; color: #fff; }
    .file-item.selected { background: #37373d; color: #fff; }
    
    .file-icon-py { color: #3572A5; }
    .file-icon-html { color: #e34c26; }
    .file-icon-c { color: #555555; }

    /* ─── EDITOR MAIN AREA ─── */
    .editor-main {
      position: absolute;
      top: 38px; /* tab height */
      left: 250px;
      right: 0;
      bottom: 24px;
      background: var(--bg-dark);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s, visibility 0.5s;
      overflow-y: auto;
    }
    
    .editor-main.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Code Viewer Table */
    .code-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    
    .line-row:hover .line-number {
      color: #c6c6c6;
    }
    
    .line-number {
      width: 50px;
      min-width: 50px;
      text-align: right;
      padding-right: 16px;
      color: #6e7681;
      user-select: none;
      vertical-align: top;
      background: var(--bg-dark);
      border-right: 1px solid var(--border-color);
    }
    
    .line-content {
      padding-left: 16px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #d4d4d4;
    }

    /* Syntax Highlighting */
    .md-header { color: #569cd6; font-weight: bold; }
    .md-bold { color: #4fc1ff; font-weight: bold; }
    .md-code { color: #ce9178; }
    .md-quote { color: #6a9955; font-style: italic; }
    .md-link { color: #dcdcaa; text-decoration: underline; }
    .md-html { color: #808080; }

    /* ─── STATUS BAR ─── */
    .statusbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--accent);
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      font-size: 0.75rem;
      z-index: 20;
    }
    
    .status-left, .status-right {
      display: flex;
      gap: 16px;
    }
    
    .status-item {
      cursor: pointer;
    }
    
    .status-item:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .tab-container.active { left: 0; width: 100%; }
      .editor-main { left: 0; }
    }
  </style>
</head>
<body>

  <!-- Animated Tabs -->
  <div class="tab-container" id="tab-container">
    <button class="tab-btn" id="btn-py" onclick="activateFile('s1py.md', 'btn-py')">Python</button>
    <button class="tab-btn" id="btn-html" onclick="activateFile('html.md', 'btn-html')">HTML</button>
    <button class="tab-btn" id="btn-c" onclick="activateFile('c.md', 'btn-c')">C언어</button>
  </div>

  <!-- Sidebar / Explorer -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">EXPLORER</div>
    <div class="file-item selected" id="file-py" onclick="activateFile('s1py.md', 'btn-py')">
      <span class="file-icon-py">🐍</span> s1py.md
    </div>
    <div class="file-item" id="file-html" onclick="activateFile('html.md', 'btn-html')">
      <span class="file-icon-html">🌐</span> html.md
    </div>
    <div class="file-item" id="file-c" onclick="activateFile('c.md', 'btn-c')">
      <span class="file-icon-c">⚙️</span> c.md
    </div>
  </div>

  <!-- Editor Output Area -->
  <div class="editor-main" id="editor-main">
    <div id="editor-content">
      <!-- Generated code table goes here -->
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-left">
      <span class="status-item">main*</span>
      <span class="status-item" id="status-filename">s1py.md</span>
    </div>
    <div class="status-right">
      <span class="status-item">Ln <span id="status-lines">0</span>, Col 1</span>
      <span class="status-item">Spaces: 2</span>
      <span class="status-item">UTF-8</span>
      <span class="status-item">Markdown</span>
    </div>
  </div>

  <script>
    let isEditorActive = false;

    function renderMarkdownAsCode(text) {
      // 1. Escape HTML entities
      let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      // 2. Syntax Highlighting
      // Code blocks (multiline)
      html = html.replace(/(```[\s\S]*?```)/g, '<span class="md-code">$1</span>');
      // Headers
      html = html.replace(/^(#{1,6}\s+.*)$/gm, '<span class="md-header">$1</span>');
      // Bold
      html = html.replace(/(\*\*.*?\*\*)/g, '<span class="md-bold">$1</span>');
      // Inline code
      html = html.replace(/(`[^`\n]+`)/g, '<span class="md-code">$1</span>');
      // Blockquotes
      html = html.replace(/^(>\s+.*)$/gm, '<span class="md-quote">$1</span>');
      // Links
      html = html.replace(/(\[.*?\]\(.*?\))/g, '<span class="md-link">$1</span>');
      // HTML tags (escaped earlier, so we target &lt;...&gt;)
      html = html.replace(/(&lt;\/?[\w\s="'-]+&gt;)/g, '<span class="md-html">$1</span>');

      // 3. Build line-by-line table
      const lines = html.split('\n');
      let numberedHtml = '<table class="code-table">';
      for (let i = 0; i < lines.length; i++) {
        numberedHtml += `
          <tr class="line-row">
            <td class="line-number">${i + 1}</td>
            <td class="line-content">${lines[i] || ' '}</td>
          </tr>`;
      }
      numberedHtml += '</table>';
      
      return { html: numberedHtml, lineCount: lines.length };
    }

    async function loadFile(filename) {
      const editorContent = document.getElementById('editor-content');
      document.getElementById('status-filename').textContent = filename;
      
      editorContent.innerHTML = `<div style="padding: 20px; color: var(--text-dim);">Fetching ${filename}...</div>`;
      
      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const result = renderMarkdownAsCode(text);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      } catch (err) {
        const errorMsg = `// Error loading ${filename}\n// Message: ${err.message}\n\n// Note: Accessing local files via fetch() might be blocked by CORS policy.\n// Please run this HTML file through a local web server (e.g. VS Code Live Server).\n// Or check the file when uploaded to GitHub Pages.`;
        const result = renderMarkdownAsCode(errorMsg);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      }
    }

    function activateFile(filename, btnId) {
      // Trigger layout transition if not already active
      if (!isEditorActive) {
        document.getElementById('tab-container').classList.add('active');
        document.getElementById('sidebar').classList.add('active');
        
        // Slight delay for editor content to fade in smoothly
        setTimeout(() => {
          document.getElementById('editor-main').classList.add('active');
        }, 300);
        
        isEditorActive = true;
      }

      // Update Tab active state
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(btnId);
      if (activeBtn) activeBtn.classList.add('active');

      // Update Sidebar active state
      document.querySelectorAll('.file-item').forEach(item => item.classList.remove('selected'));
      const sidebarItem = document.getElementById('file-' + btnId.replace('btn-', ''));
      if (sidebarItem) sidebarItem.classList.add('selected');

      // Load file content
      loadFile(filename);
    }
  </script>
</body>
</html>
