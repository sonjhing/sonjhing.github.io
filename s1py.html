<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer IDE & Dashboard</title>
  <style>
    :root {
      /* VS Code Dark Theme Colors */
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-tab: #2d2d2d;
      --border-color: #3c3c3c;
      --accent: #007acc;
      --text-main: #cccccc;
      --text-dim: #858585;
      
      /* Windows Titlebar Colors */
      --win-bg: #323233;
      --win-text: #ffffff;
      
      /* 깔끔하고 모던한 영문 폰트 스택 */
      --font-mono: 'Fira Code', 'JetBrains Mono', 'Cascadia Code', 'Segoe UI', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: #0f0f10; 
      color: var(--text-main);
      font-family: var(--font-mono);
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      /* 최대화 애니메이션을 위한 body 트랜지션 */
      transition: transform 0.3s ease;
    }

    /* ─── DASHBOARD & INDEX NAVIGATION ─── */
    .dashboard-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #121214;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 1;
      padding: 40px;
    }

    .dashboard-container.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* 상단 목차 (Navigation) */
    .index-nav {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto 50px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 20px;
    }

    .index-logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fff;
    }

    .index-menu {
      display: flex;
      gap: 30px;
    }

    .index-menu-item {
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
      text-decoration: none;
    }

    .index-menu-item:hover {
      color: var(--accent);
    }

    /* 언어 카드 그리드 */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      flex: 1;
      align-items: center;
    }

    .lang-card {
      background: #1c1c1f;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px 30px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    }

    .lang-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent);
      box-shadow: 0 10px 20px rgba(0, 122, 204, 0.2);
    }

    .lang-card .icon {
      font-size: 3.5rem;
      margin-bottom: 20px;
      display: block;
    }

    .lang-card h3 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      color: #fff;
    }

    .lang-card p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-dim);
    }

    /* ─── WINDOW FRAME CONTAINER ─── */
    .window-frame {
      width: 90vw;
      height: 85vh;
      background-color: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
      z-index: 10;
    }

    .window-frame.closed {
      transform: scale(0.95) translateY(20px);
      opacity: 0;
      pointer-events: none;
    }

    /* ─── WINDOW TITLEBAR ─── */
    .titlebar {
      height: 32px;
      background-color: var(--win-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
      user-select: none;
      border-bottom: 1px solid var(--border-color);
      z-index: 30;
    }

    .titlebar-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #aaaaaa;
    }

    .titlebar-controls {
      display: flex;
      height: 100%;
    }

    .win-btn {
      width: 46px;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      border: none;
      color: var(--win-text);
      font-size: 0.75rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .win-btn:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .win-btn.close-btn:hover {
      background-color: #e81123;
      color: #fff;
    }

    /* ─── WINDOW CONTENT AREA ─── */
    .window-content {
      flex: 1;
      position: relative;
      width: 100%;
      height: calc(100% - 32px);
    }

    /* ─── ANIMATED TAB CONTAINER ─── */
    .tab-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      z-index: 10;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .tab-container.active {
      top: 0;
      left: 250px;
      transform: translate(0, 0);
      width: calc(100% - 250px);
      gap: 0;
      background: var(--bg-panel);
      padding: 0;
    }

    .tab-btn {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      padding: 14px 32px;
      background: #333333;
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }
    
    .tab-btn:hover {
      background: #444444;
      color: #ffffff;
    }

    .tab-container.active .tab-btn {
      font-size: 0.85rem;
      padding: 8px 20px; 
      border: none;
      border-right: 1px solid var(--border-color);
      border-radius: 0;
      background: var(--bg-tab);
    }
    
    .tab-container.active .tab-btn.active {
      background: var(--bg-dark);
      color: #ffffff;
      border-top: 2px solid var(--accent);
    }

    /* ─── SIDEBAR (EXPLORER) ─── */
    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 250px;
      bottom: 24px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 5;
    }
    
    .sidebar.active {
      transform: translateX(0);
    }
    
    .sidebar-header {
      font-size: 0.75rem;
      padding: 12px 20px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    
    .file-item {
      padding: 6px 20px 6px 30px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .file-item:hover { background: #2a2d2e; color: #fff; }
    .file-item.selected { background: #37373d; color: #fff; }
    
    .file-icon-py { color: #3572A5; }
    .file-icon-html { color: #e34c26; }
    .file-icon-c { color: #a8b9cc; }

    /* ─── EDITOR MAIN AREA ─── */
    .editor-main {
      position: absolute;
      top: 35px;
      left: 250px;
      right: 0;
      bottom: 24px;
      background: var(--bg-dark);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s, visibility 0.5s;
      overflow-y: auto;
    }
    
    .editor-main.active {
      opacity: 1;
      visibility: visible;
    }
    
    .code-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    
    .line-row:hover {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .line-row:hover .line-number {
      color: #c6c6c6;
    }
    
    .line-number {
      width: 50px;
      min-width: 50px;
      text-align: right;
      padding-right: 16px;
      color: #6e7681;
      user-select: none;
      vertical-align: top;
      background: var(--bg-dark);
      border-right: 1px solid var(--border-color);
    }
    
    .line-content {
      padding-left: 16px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #d4d4d4;
    }

    /* Syntax Highlighting */
    .md-header { color: #4fc1ff; font-weight: bold; } 
    .md-bold { color: #e06c75; font-weight: bold; }   
    .md-code { color: #ce9178; background: #252526; padding: 2px 4px; border-radius: 3px; } 
    .md-quote { color: #6a9955; font-style: italic; } 
    .md-link { color: #9cdcfe; text-decoration: underline; } 
    .md-html { color: #6085e6; }                       
    .md-err-msg { color: #f48771; }                    

    /* ─── STATUS BAR ─── */
    .statusbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--accent);
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      font-size: 0.75rem;
      z-index: 20;
    }
    
    .status-left, .status-right {
      display: flex;
      gap: 16px;
    }
    
    .status-item {
      cursor: pointer;
    }

    /* 바탕화면 안내 메시지 */
    .bg-hint {
      position: absolute;
      font-size: 0.9rem;
      color: #333335;
      user-select: none;
      pointer-events: none;
      text-align: center;
      bottom: 20px;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .tab-container.active { left: 0; width: 100%; }
      .editor-main { left: 0; }
      .card-grid { grid-template-columns: 1fr; gap: 15px; }
    }
  </style>
</head>
<body>

  <div class="dashboard-container" id="dashboard">
    <div class="index-nav">
      <div class="index-logo">INDEX / DOCS</div>
      <div class="index-menu">
        <span class="index-menu-item" onclick="openIdeWithFile('s1py.md', 'btn-py')">Python</span>
        <span class="index-menu-item" onclick="openIdeWithFile('html.md', 'btn-html')">HTML</span>
        <span class="index-menu-item" onclick="openIdeWithFile('c.md', 'btn-c')">C Language</span>
      </div>
    </div>

    <div class="card-grid">
      <div class="lang-card" onclick="openIdeWithFile('s1py.md', 'btn-py')">
        <span class="icon">🐍</span>
        <h3>Python</h3>
        <p>s1py.md 파일 열기</p>
      </div>
      <div class="lang-card" onclick="openIdeWithFile('html.md', 'btn-html')">
        <span class="icon">🌐</span>
        <h3>HTML</h3>
        <p>html.md 파일 열기</p>
      </div>
      <div class="lang-card" onclick="openIdeWithFile('c.md', 'btn-c')">
        <span class="icon">⚙️</span>
        <h3>C Language</h3>
        <p>c.md 파일 열기</p>
      </div>
    </div>
  </div>

  <div class="bg-hint">IDE 창이 최소화되었을 때 인덱스 대시보드가 활성화됩니다.</div>

  <div class="window-frame" id="window-frame">
    
    <div class="titlebar">
      <div class="titlebar-info">
        <span class="titlebar-icon">💻</span>
        <span class="titlebar-title">Developer IDE - Visual Studio Code</span>
      </div>
      <div class="titlebar-controls">
        <button class="win-btn" onclick="minimizeWindow()">─</button>
        <button class="win-btn" id="max-btn" onclick="toggleMaximize()">❑</button>
        <button class="win-btn close-btn" onclick="closeWindow()">✕</button>
      </div>
    </div>

    <div class="window-content">
      <div class="tab-container" id="tab-container">
        <button class="tab-btn" id="btn-py" onclick="activateFile('s1py.md', 'btn-py')">Python</button>
        <button class="tab-btn" id="btn-html" onclick="activateFile('html.md', 'btn-html')">HTML</button>
        <button class="tab-btn" id="btn-c" onclick="activateFile('c.md', 'btn-c')">C언어</button>
      </div>

      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">EXPLORER</div>
        <div class="file-item" id="file-py" onclick="activateFile('s1py.md', 'btn-py')">
          <span class="file-icon-py">🐍</span> s1py.md
        </div>
        <div class="file-item" id="file-html" onclick="activateFile('html.md', 'btn-html')">
          <span class="file-icon-html">🌐</span> html.md
        </div>
        <div class="file-item" id="file-c" onclick="activateFile('c.md', 'btn-c')">
          <span class="file-icon-c">⚙️</span> c.md
        </div>
      </div>

      <div class="editor-main" id="editor-main">
        <div id="editor-content"></div>
      </div>

      <div class="statusbar">
        <div class="status-left">
          <span class="status-item">main*</span>
          <span class="status-item" id="status-filename">s1py.md</span>
        </div>
        <div class="status-right">
          <span class="status-item">Ln <span id="status-lines">0</span>, Col 1</span>
          <span class="status-item">Spaces: 2</span>
          <span class="status-item">UTF-8</span>
          <span class="status-item">Markdown</span>
        </div>
      </div>
    </div> </div> <script>
    let isEditorActive = false;
    let isMaximized = false; // 최대화 토글 상태 체크 변수

    // 초기 구동 시 s1py.md 자동 로드
    window.onload = function() {
      activateFile('s1py.md', 'btn-py');
    };

    // 최대화 버튼 작동 함수 (전체 화면 10% 확대/축소 토글)
    function toggleMaximize() {
      const body = document.body;
      const maxBtn = document.getElementById('max-btn');
      
      if (!isMaximized) {
        body.style.transform = "scale(1.1)";
        maxBtn.textContent = "❐"; // 창 복원 아이콘으로 변경
        isMaximized = true;
      } else {
        body.style.transform = "scale(1)";
        maxBtn.textContent = "❑"; // 기본 최대화 아이콘으로 변경
        isMaximized = false;
      }
    }

    // 최소화 기능 구현: IDE 숨기고 대시보드 표시
    function minimizeWindow() {
      document.getElementById('window-frame').classList.add('closed');
      document.getElementById('dashboard').classList.add('active');
    }

    // 대시보드에서 항목 클릭 시 IDE 복귀 및 파일 전환
    function openIdeWithFile(filename, btnId) {
      document.getElementById('dashboard').classList.remove('active');
      document.getElementById('window-frame').classList.remove('closed');
      activateFile(filename, btnId);
    }

    // 완전히 창을 닫았을 때 처리
    function closeWindow() {
      document.getElementById('window-frame').classList.add('closed');
      document.getElementById('dashboard').classList.add('active');
    }

    function renderMarkdownAsCode(text) {
      let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      html = html.replace(/(```[\s\S]*?```)/g, '<span class="md-code">$1</span>');
      html = html.replace(/^(#{1,6}\s+.*)$/gm, '<span class="md-header">$1</span>');
      html = html.replace(/(\*\*.*?\*\*)/g, '<span class="md-bold">$1</span>');
      html = html.replace(/(`[^`\n]+`)/g, '<span class="md-code">$1</span>');
      html = html.replace(/^(>\s+.*)$/gm, '<span class="md-quote">$1</span>');
      html = html.replace(/(\[.*?\]\(.*?\))/g, '<span class="md-link">$1</span>');
      html = html.replace(/(&lt;\/?[\w\s="'-]+&gt;)/g, '<span class="md-html">$1</span>');
      html = html.replace(/^(\/\/.*)$/gm, '<span class="md-err-msg">$1</span>');

      const lines = html.split('\n');
      let numberedHtml = '<table class="code-table">';
      for (let i = 0; i < lines.length; i++) {
        numberedHtml += `
          <tr class="line-row">
            <td class="line-number">${i + 1}</td>
            <td class="line-content">${lines[i] || ' '}</td>
          </tr>`;
      }
      numberedHtml += '</table>';
      
      return { html: numberedHtml, lineCount: lines.length };
    }

    async function loadFile(filename) {
      const editorContent = document.getElementById('editor-content');
      document.getElementById('status-filename').textContent = filename;
      editorContent.innerHTML = `<div style="padding: 20px; color: var(--text-dim);">Fetching ${filename}...</div>`;
      
      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const result = renderMarkdownAsCode(text);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      } catch (err) {
        const errorMsg = `// Error loading ${filename}\n// Message: ${err.message}\n\n// Note: Accessing local files via fetch() might be blocked by CORS policy.\n// Please run this HTML file through a local web server (e.g. VS Code Live Server).\n// Or check the file when uploaded to GitHub Pages.`;
        const result = renderMarkdownAsCode(errorMsg);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      }
    }

    function activateFile(filename, btnId) {
      if (!isEditorActive) {
        document.getElementById('tab-container').classList.add('active');
        document.getElementById('sidebar').classList.add('active');
        
        setTimeout(() => {
          document.getElementById('editor-main').classList.add('active');
        }, 300);
        
        isEditorActive = true;
      }

      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(btnId);
      if (activeBtn) activeBtn.classList.add('active');

      document.querySelectorAll('.file-item').forEach(item => item.classList.remove('selected'));
      const sidebarItem = document.getElementById('file-' + btnId.replace('btn-', ''));
      if (sidebarItem) sidebarItem.classList.add('selected');

      loadFile(filename);
    }
  </script>
</body>
</html>
