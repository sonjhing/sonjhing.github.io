<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer IDE</title>
  <!-- Load high-legibility web fonts as fallbacks -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Load Pretendard -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />

  <style>
    :root {
      /* VS Code Dark Theme Colors */
      --bg-dark: #1e1e1e;
      --bg-panel: #252526;
      --bg-tab: #2d2d2d;
      --border-color: #3c3c3c;
      --accent: #007acc;
      --text-main: #cccccc;
      --text-dim: #858585;
      
      /* Task 2: Advanced Typography Stack */
      --font-ui: 'SF Pro Display', 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-code: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Pretendard', 'Noto Sans KR', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-main);
      
      /* Global Font Rendering Optimization */
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      letter-spacing: -0.02em;
      line-height: 1.7;
      
      overflow: hidden; /* No scroll on body, scroll inside editor */
      height: 100vh;
    }

    /* ─── ANIMATED TAB CONTAINER ─── */
    .tab-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      z-index: 10;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    .tab-container.active {
      top: 0;
      left: 250px;
      transform: translate(0, 0);
      width: calc(100% - 250px);
      gap: 0;
      background: var(--bg-panel);
      padding: 0;
    }

    .tab-btn {
      position: relative;
      font-family: var(--font-ui);
      font-size: 1.2rem;
      padding: 16px 36px;
      background: linear-gradient(145deg, #2a2a2a, #333333);
      color: var(--text-main);
      border: 1px solid #4a4a4a;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      letter-spacing: -0.01em;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    
    /* Subtle accent line on hover */
    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .tab-btn:hover {
      background: linear-gradient(145deg, #333333, #3f3f3f);
      color: #ffffff;
      border-color: #666;
      box-shadow: 0 8px 25px rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    
    .tab-btn:hover::after {
      opacity: 1;
      box-shadow: 0 -2px 10px var(--accent);
    }
    
    /* Unique subtle colors for each button */
    #btn-py:hover::after { background: #3572A5; box-shadow: 0 -2px 12px rgba(53, 114, 165, 0.6); }
    #btn-html:hover::after { background: #e34c26; box-shadow: 0 -2px 12px rgba(227, 76, 38, 0.6); }
    #btn-c:hover::after { background: #00ffff; box-shadow: 0 -2px 12px rgba(0, 255, 255, 0.4); }

    /* Tabs when in active (top-bar) mode */
    .tab-container.active .tab-btn {
      font-size: 0.9rem;
      padding: 10px 24px;
      border: none;
      border-right: 1px solid var(--border-color);
      border-radius: 0;
      background: var(--bg-tab);
      box-shadow: none;
      transform: none;
    }
    
    .tab-container.active .tab-btn::after {
      display: none; /* Hide hover line in IDE mode */
    }
    
    .tab-container.active .tab-btn.active {
      background: var(--bg-dark);
      color: #ffffff;
      border-top: 2px solid var(--accent);
    }

    /* ─── SIDEBAR (EXPLORER) ─── */
    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 250px;
      bottom: 24px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-color);
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 5;
    }
    
    .sidebar.active {
      transform: translateX(0);
    }
    
    .sidebar-header {
      font-size: 0.75rem;
      padding: 12px 20px;
      color: var(--text-dim);
      letter-spacing: 1px;
      font-weight: 600;
    }
    
    .file-item {
      padding: 6px 20px 6px 30px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .file-item:hover { background: #2a2d2e; color: #fff; }
    .file-item.selected { background: #37373d; color: #fff; }
    
    .file-icon-py { color: #3572A5; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; }
    .file-icon-html { color: #e34c26; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; }
    .file-icon-c { color: #555555; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif; }

    /* ─── EDITOR MAIN AREA ─── */
    .editor-main {
      position: absolute;
      top: 38px;
      left: 250px;
      right: 0;
      bottom: 24px;
      background: var(--bg-dark);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s, visibility 0.5s;
      overflow-y: auto;
    }
    
    .editor-main.active {
      opacity: 1;
      visibility: visible;
    }
    
    /* Code Viewer Table - Optimized for crisp text rendering */
    .code-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-family: var(--font-code);
      font-size: 14.5px;
      line-height: 1.7;
    }
    
    .line-row:hover {
      background: rgba(255,255,255,0.02);
    }
    .line-row:hover .line-number {
      color: #c6c6c6;
    }
    
    .line-number {
      width: 50px;
      min-width: 50px;
      max-width: 50px;
      text-align: right;
      padding-right: 16px;
      color: #6e7681;
      user-select: none;
      vertical-align: top;
      background: var(--bg-dark);
      border-right: 1px solid var(--border-color);
      /* Prevent subpixel blurring on borders */
      transform: translateZ(0); 
    }
    
    .line-content {
      padding-left: 16px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #d4d4d4;
    }

    /* Syntax Highlighting */
    .md-header { color: #569cd6; font-weight: 600; }
    .md-bold { color: #4fc1ff; font-weight: 600; }
    .md-code { color: #ce9178; }
    .md-quote { color: #6a9955; font-style: italic; }
    .md-link { color: #dcdcaa; text-decoration: underline; }
    .md-html { color: #808080; }

    /* ─── STATUS BAR ─── */
    .statusbar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: var(--accent);
      color: #ffffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
      font-size: 0.75rem;
      z-index: 20;
    }
    
    .status-left, .status-right {
      display: flex;
      gap: 16px;
    }
    
    .status-item {
      cursor: pointer;
    }
    
    .status-item:hover {
      background: rgba(255,255,255,0.1);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .tab-container.active { left: 0; width: 100%; }
      .editor-main { left: 0; }
    }
  </style>
</head>
<body>

  <!-- Animated Tabs -->
  <div class="tab-container" id="tab-container">
    <button class="tab-btn" id="btn-py" onclick="activateFile('s2py.md', 'btn-py')">Python</button>
    <button class="tab-btn" id="btn-html" onclick="activateFile('html.md', 'btn-html')">HTML</button>
    <button class="tab-btn" id="btn-c" onclick="activateFile('c.md', 'btn-c')">C언어</button>
  </div>

  <!-- Sidebar / Explorer -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">EXPLORER</div>
    <div class="file-item selected" id="file-py2" onclick="activateFile('s2py.md', 'btn-py')">
      <span class="file-icon-py">🚀</span> s2py.md
    </div>
    <div class="file-item" id="file-py" onclick="activateFile('s1py.md', 'btn-py')">
      <span class="file-icon-py">🐍</span> s1py.md
    </div>
    <div class="file-item" id="file-html" onclick="activateFile('html.md', 'btn-html')">
      <span class="file-icon-html">🌐</span> html.md
    </div>
    <div class="file-item" id="file-c" onclick="activateFile('c.md', 'btn-c')">
      <span class="file-icon-c">⚙️</span> c.md
    </div>
  </div>

  <!-- Editor Output Area -->
  <div class="editor-main" id="editor-main">
    <div id="editor-content">
      <!-- Generated code table goes here -->
    </div>
  </div>

  <!-- Status Bar -->
  <div class="statusbar">
    <div class="status-left">
      <span class="status-item">main*</span>
      <span class="status-item" id="status-filename">s2py.md</span>
    </div>
    <div class="status-right">
      <span class="status-item">Ln <span id="status-lines">0</span>, Col 1</span>
      <span class="status-item">Spaces: 4</span>
      <span class="status-item">UTF-8</span>
      <span class="status-item">Markdown</span>
    </div>
  </div>

  <script>
    let isEditorActive = false;

    function renderMarkdownAsCode(text) {
      // 1. Escape HTML entities
      let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      
      // 2. Syntax Highlighting
      // Code blocks (multiline)
      html = html.replace(/(```[\s\S]*?```)/g, '<span class="md-code">$1</span>');
      // Headers
      html = html.replace(/^(#{1,6}\s+.*)$/gm, '<span class="md-header">$1</span>');
      // Bold
      html = html.replace(/(\*\*.*?\*\*)/g, '<span class="md-bold">$1</span>');
      // Inline code
      html = html.replace(/(`[^`\n]+`)/g, '<span class="md-code">$1</span>');
      // Blockquotes
      html = html.replace(/^(>\s+.*)$/gm, '<span class="md-quote">$1</span>');
      // Links
      html = html.replace(/(\[.*?\]\(.*?\))/g, '<span class="md-link">$1</span>');
      // HTML tags (escaped earlier, so we target &lt;...&gt;)
      html = html.replace(/(&lt;\/?[\w\s="'-]+&gt;)/g, '<span class="md-html">$1</span>');

      // 3. Build line-by-line table
      const lines = html.split('\n');
      let numberedHtml = '<table class="code-table">';
      for (let i = 0; i < lines.length; i++) {
        numberedHtml += `
          <tr class="line-row">
            <td class="line-number">${i + 1}</td>
            <td class="line-content">${lines[i] || ' '}</td>
          </tr>`;
      }
      numberedHtml += '</table>';
      
      return { html: numberedHtml, lineCount: lines.length };
    }

    async function loadFile(filename) {
      const editorContent = document.getElementById('editor-content');
      document.getElementById('status-filename').textContent = filename;
      
      editorContent.innerHTML = `<div style="padding: 20px; color: var(--text-dim); font-family: var(--font-ui);">Fetching ${filename}...</div>`;
      
      // Embed s2py.md for offline access (since it's short)
      if (filename === 's2py.md') {
        const s2pyContent = `# [SYSTEM] INITIALIZING Python 3.10+ Core Engine...
> STATUS: \`[STABLE]\` | VERSION: \`[v3.12.2]\` | BUILD: \`[f6b4e0]\`

## 1. Type Hinting & Structural Pattern Matching
The era of ambiguous variables is over. Python 3.10 introduced **Structural Pattern Matching**, empowering developers with the mighty \`match-case\` statement. Combined with rigorous Type Hinting, the runtime becomes predictable and bulletproof.

\`\`\`python
from dataclasses import dataclass
from typing import Literal

@dataclass
class HttpResponse:
    status: int
    body: str | dict  # PEP 604: Union operators as pipes

def handle_request(response: HttpResponse) -> Literal['Success', 'ClientError', 'ServerError']:
    match response:
        case HttpResponse(status=200 | 201, body=payload):
            print(f"Data received: {payload}")
            return 'Success'
        case HttpResponse(status=400 | 404):
            print("Bad request or not found.")
            return 'ClientError'
        case HttpResponse(status=500):
            print("Internal Server Error.")
            return 'ServerError'
        case _:
            raise ValueError(f"Unknown status: {response.status}")
\`\`\`

## 2. Memory Optimization via \`__slots__\`
When instantiating millions of objects, the default \`__dict__\` overhead is an architectural bottleneck. Explicitly defining \`__slots__\` statically allocates memory, slashing memory footprint and drastically improving attribute access speed.

\`\`\`python
class Particle:
    __slots__ = ('x', 'y', 'mass')
    
    def __init__(self, x: float, y: float, mass: float) -> None:
        self.x = x
        self.y = y
        self.mass = mass
\`\`\`
*Note: Using \`__slots__\` breaks multiple inheritance if not managed carefully. Architecture over convenience.*

## 3. High-Performance Concurrency: \`asyncio\`
In modern microservices architectures, blocking I/O is a sin. \`asyncio\` orchestrates asynchronous tasks with an event loop, keeping the CPU working while waiting for network responses.

\`\`\`python
import asyncio
import time

async def fetch_data(id: int) -> dict:
    await asyncio.sleep(0.5)  # Simulating network latency
    return {"id": id, "status": "fetched"}

async def main() -> None:
    start_time = time.perf_counter()
    
    # Run coroutines concurrently using asyncio.gather
    tasks = [fetch_data(i) for i in range(1, 101)]
    results = await asyncio.gather(*tasks)
    
    elapsed = time.perf_counter() - start_time
    print(f"[{elapsed:.2f}s] Processed {len(results)} tasks asynchronously.")

if __name__ == '__main__':
    asyncio.run(main())
\`\`\`

\`\`\`
//=========================================
// PRODUCTION READY CHECKLIST
//=========================================
// [x] Mypy strictly typed & validated (--strict mode)
// [x] Pytest coverage > 95%
// [x] Flake8/Black syntax formatting passed
// [x] Profiling done: No memory leaks detected in __slots__
// [ ] Security Audit: Bandit dependency check
//=========================================
// DEPLOYMENT APPROVED. AWAITING SIGNAL.
\`\`\``;
        const result = renderMarkdownAsCode(s2pyContent);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
        return;
      }

      try {
        const res = await fetch(filename);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const result = renderMarkdownAsCode(text);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      } catch (err) {
        const errorMsg = `// [WARNING: FILE NOT DELETED]
// ⚠️ ${filename} 파일은 안전하게 보존되어 있습니다!
// 현재 브라우저의 보안 정책(CORS)으로 인해 로컬(C드라이브)에서 직접 파일을 읽어오는 것이 차단되었습니다.
// 
// [해결 방법]
// 1. VS Code의 'Live Server' 확장 프로그램을 사용하여 이 HTML 파일을 엽니다.
// 2. 또는 GitHub Pages로 배포된 웹사이트에서 확인하시면 정상적으로 ${filename}의 모든 내용이 나타납니다!
// 
// (s2py.md 탭을 클릭하시면 미리 내장된 샘플 코드를 테스트해 보실 수 있습니다.)`;
        const result = renderMarkdownAsCode(errorMsg);
        editorContent.innerHTML = result.html;
        document.getElementById('status-lines').textContent = result.lineCount;
      }
    }

    function activateFile(filename, btnId) {
      // Trigger layout transition if not already active
      if (!isEditorActive) {
        document.getElementById('tab-container').classList.add('active');
        document.getElementById('sidebar').classList.add('active');
        
        // Slight delay for editor content to fade in smoothly
        setTimeout(() => {
          document.getElementById('editor-main').classList.add('active');
        }, 300);
        
        isEditorActive = true;
      }

      // Update Tab active state
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById(btnId);
      if (activeBtn) activeBtn.classList.add('active');

      // Update Sidebar active state
      document.querySelectorAll('.file-item').forEach(item => item.classList.remove('selected'));
      // Sidebar selection logic based on filename for precise matching
      let sidebarId = '';
      if (filename === 's2py.md') sidebarId = 'file-py2';
      else if (filename === 's1py.md') sidebarId = 'file-py';
      else if (filename === 'html.md') sidebarId = 'file-html';
      else if (filename === 'c.md') sidebarId = 'file-c';

      const sidebarItem = document.getElementById(sidebarId);
      if (sidebarItem) sidebarItem.classList.add('selected');

      // Load file content
      loadFile(filename);
    }
  </script>
</body>
</html>
