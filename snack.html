<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과자 인식 Engine - Advanced Scanner</title>
    <style>
        /* ======================
            RESET & CYBERPUNK BASE (전체 배경 딥블루-블랙)
        ====================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #030d26 0%, #01040d 100%);
            color: #94a3b8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 40px;
            padding: 20px;
            overflow-x: hidden;
            position: relative; 
        }

        /* 🟢 왼쪽 상단 이전 버튼 스타일 */
        .top-nav-bar {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 100;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #00e5ff;
            background: rgba(7, 15, 36, 0.7);
            border: 2px solid #1e3a8a;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 10px rgba(30, 58, 138, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-btn:hover {
            color: #ffffff;
            border-color: #3b82f6;
            background: linear-gradient(135deg, rgba(7, 15, 36, 0.9) 0%, rgba(59, 130, 246, 0.2) 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.25), inset 0 0 15px rgba(59, 130, 246, 0.2);
        }

        /* ======================
            📱 SMARTPHONE UI (회색 테두리 + 검정 바디)
        ====================== */
        .phone-container {
            width: 360px;
            height: 740px;
            background-color: #1a1a1a; 
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 4px solid #475569; 
            position: relative;
        }

        .phone-notch {
            width: 150px;
            height: 25px;
            background-color: #1a1a1a; 
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            z-index: 10;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 🟦 상단 타이틀 영역 */
        .screen-header {
            background-color: #0b1528; 
            color: white;
            padding: 35px 20px 15px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 과자 스캐너 내부 카메라 영역 */
        .camera-view {
            flex: 1;
            background-color: #f1f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
            border: 3px dashed transparent;
        }

        .camera-view.drag-over {
            background-color: #ffe3e3;
            border-color: #0b1528;
        }

        .camera-placeholder {
            text-align: center;
            color: #adb5bd;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .scanned-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 🟢 스캔 레이저 라인 & 반투명 스캔빔 */
        .scan-effect-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        .scan-laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00e5ff, #3b82f6, #00e5ff, transparent);
            box-shadow: 0 0 12px #00e5ff, 0 0 25px #3b82f6;
            animation: scanMove 2s ease-in-out infinite alternate;
        }

        .scan-beam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 229, 255, 0.15) 0%, transparent 100%);
            transform-origin: top center;
            animation: beamMove 2s ease-in-out infinite alternate;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        @keyframes beamMove {
            0% { top: 0%; height: 0%; opacity: 0; }
            10% { opacity: 1; }
            100% { top: 0%; height: 100%; opacity: 0.4; }
        }

        /* 결과창 패널 */
        .result-overlay {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(26, 26, 26, 0.95);
            color: white;
            padding: 18px 25px;
            border-radius: 22px;
            width: 88%;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 6;
        }

        .result-overlay.active {
            opacity: 1;
        }

        .result-title {
            font-size: 0.8rem;
            color: #ffb703;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .result-name {
            font-size: 1.25rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .result-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.4;
            font-weight: normal;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 8px;
        }

        /* ======================
            🍪 SNACK CARD LIST (오직 이미지만 격자형 스타일로 표현)
        ====================== */
        .card-list-container {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-title {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00e5ff 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 5px;
            border-left: 5px solid #3b82f6;
            padding-left: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.3));
        }

        /* 🟢 텍스트가 빠진 정사각형 이미지 뷰 최적화 */
        .snack-card {
            background: rgba(7, 15, 36, 0.7);
            border: 2px solid #1e3a8a;
            border-radius: 20px;
            padding: 12px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(30, 58, 138, 0.3);
            user-select: none;
            backdrop-filter: blur(10px);
            width: 100%;
            height: 130px; /* 고정 높이 확보 */
        }

        .snack-card:active {
            cursor: grabbing;
        }

        .snack-card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
            background: linear-gradient(135deg, rgba(7, 15, 36, 0.9) 0%, rgba(59, 130, 246, 0.15) 100%);
            box-shadow: 0 25px 50px rgba(59, 130, 246, 0.3), inset 0 0 25px rgba(59, 130, 246, 0.2);
        }

        .snack-avatar {
            width: 100%;
            height: 100%;
            background-color: rgba(2, 6, 23, 0.4);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .snack-card:hover .snack-avatar {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.6));
        }

        .snack-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <div class="top-nav-bar">
        <a href="info.html" class="back-btn">◀ 이전</a>
    </div>

    <div class="phone-container">
        <div class="phone-notch"></div>
        <div class="phone-screen">
            <div class="screen-header">과자 스캔 AI 스캐너</div>
            
            <div class="camera-view" id="drop-zone">
                <div class="camera-placeholder" id="placeholder-text">
                    <span style="font-size: 3.5rem;">🍤</span>
                    <p style="margin-top: 12px; font-weight: 500;">과자를 드래그해서<br>여기에 넣어주세요!</p>
                </div>
                <img id="camera-image" class="scanned-img" src="" alt="과자 이미지">
                
                <div class="scan-effect-wrapper" id="scan-effect">
                    <div class="scan-beam"></div>
                    <div class="scan-laser"></div>
                </div>

                <div class="result-overlay" id="result-popup">
                    <div class="result-title" id="scan-status-title">스캔 분석 중...</div>
                    <div class="result-name" id="snack-result-text">과자 이름</div>
                    <div class="result-desc" id="snack-result-desc" style="display: none;">과자 설명</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card-list-container">
        <h2 class="list-title">과자 인식 Engine</h2>
        
        <div class="snack-card" draggable="true" 
             data-name="새우깡" 
             data-desc="손이 가요 손이 가~ 눈이 가요 눈이 가~<br>생새우로 만든 대한민국 오리지널 스낵!"
             data-img="sae.jpg">
            <div class="snack-avatar">
                <img src="sae.jpg" alt="새우깡">
            </div>
        </div>

        <div class="snack-card" draggable="true" 
             data-name="콘초" 
             data-desc="부드럽고 고소한 콘스낵 위에<br>달콤한 초콜릿이 듬뿍 발라진 꿀조합!"
             data-img="con.jpg">
            <div class="snack-avatar">
                <img src="con1.jpg" alt="콘초">
            </div>
        </div>

        <div class="snack-card" draggable="true" 
             data-name="칸쵸" 
             data-desc="바삭한 동글이 과자 속에 달콤한 초코!<br>귀여운 캐릭터 그림을 찾는 재미까지"
             data-img="kan.jpg">
            <div class="snack-avatar">
                <img src="kan.jpg" alt="칸쵸">
            </div>
        </div>

        <div class="snack-card" draggable="true" 
             data-name="다이제" 
             data-desc="묵직하고 바삭한 통밀 비스킷과<br>진하고 깊은 초콜릿의 완벽한 하모니!"
             data-img="diget.jpg">
            <div class="snack-avatar">
                <img src="diget.jpg" alt="다이제">
            </div>
        </div>
    </div>

    <script>
        const cards = document.querySelectorAll('.snack-card');
        const dropZone = document.getElementById('drop-zone');
        const placeholder = document.getElementById('placeholder-text');
        const cameraImage = document.getElementById('camera-image');
        const resultPopup = document.getElementById('result-popup');
        const resultStatusTitle = document.getElementById('scan-status-title');
        const resultText = document.getElementById('snack-result-text');
        const resultDesc = document.getElementById('snack-result-desc'); 
        const scanEffect = document.getElementById('scan-effect');

        // 1. 드래그 시작 데이터 탑재
        cards.forEach(card => {
            card.addEventListener('dragstart', (e) => {
                const payload = JSON.stringify({
                    name: card.dataset.name,
                    desc: card.dataset.desc, 
                    img: card.dataset.img
                });
                e.dataTransfer.setData('text/plain', payload);
            });
        });

        // 2. 드래그 레이아웃 제어
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        // 3. 드롭 및 가상 인터랙션 스캔 트리거
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');

            try {
                const data = JSON.parse(e.dataTransfer.getData('text/plain'));
                const snackName = data.name;
                const snackDesc = data.desc; 
                const imageUrl = data.img;

                if (snackName && imageUrl) {
                    resultPopup.classList.remove('active');
                    resultDesc.style.display = 'none'; 
                    placeholder.style.display = 'none';
                    cameraImage.src = imageUrl;
                    cameraImage.style.display = 'block';

                    scanEffect.style.display = 'block';

                    // [스캔 단계 1] 가동
                    resultStatusTitle.textContent = "SYSTEM: 스캔 가동 중...";
                    resultText.textContent = "과자 실루엣 분석 중...";
                    resultPopup.classList.add('active');

                    // [스캔 단계 2] 연산
                    setTimeout(() => {
                        resultStatusTitle.textContent = "ANALYSIS: 인식 확률 계산 중...";
                        const randomConfidence = Math.floor(Math.random() * 5) + 95; 
                        resultText.textContent = `일치율 ${randomConfidence}% 분석 완료`;
                    }, 1200);

                    // [스캔 단계 3] 결과 매핑 및 완료 출력
                    setTimeout(() => {
                        scanEffect.style.display = 'none'; 
                        resultStatusTitle.textContent = "🟢 스캔 완료";
                        
                        resultText.innerHTML = snackName;
                        resultDesc.innerHTML = snackDesc;
                        resultDesc.style.display = 'block'; 
                    }, 2400);
                }
            } catch(e) {
                console.error('Drag data parse error:', e);
            }
        });
    </script>
</body>
</html>
